name: Daily PSX Scout

on:
  schedule:
    # 04:45 UTC = 09:45 PKT (Mon–Fri)
    - cron: "45 4 * * 1-5"
  workflow_dispatch:
    inputs:
      force:
        description: "Pass --force to scout.py (skip cooldown check)"
        required: false
        default: "false"


jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Java (for PDF extraction)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scout
        id: scout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ARGS="--auto"
          if [[ "${{ github.event.inputs.force }}" == "true" ]]; then
            ARGS="$ARGS --force"
          fi
          python3 scout.py $ARGS 2>&1 | tee /tmp/scout_output.txt
          # Extract verdict line for email subject
          VERDICT=$(grep -oP '(?<=Verdict: )(SKIP|RUN|URGENT)' /tmp/scout_output.txt || echo "UNKNOWN")
          echo "verdict=$VERDICT" >> $GITHUB_OUTPUT
          # Capture full output for email body
          echo "output<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/scout_output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: khawaja.junaid07@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "PSX Scout [${{ steps.scout.outputs.verdict }}] — ${{ github.run_id }}"
          to: khawaja.junaid07@gmail.com
          from: PSX Scout <khawaja.junaid07@gmail.com>
          body: |
            ${{ steps.scout.outputs.output }}

            ---
            Run: https://github.com/khawajaJunaid/psx-agent-private/actions/runs/${{ github.run_id }}

      - name: Upload scout log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scout-log-${{ github.run_id }}
          path: |
            logs/
            db.sqlite
          retention-days: 30
